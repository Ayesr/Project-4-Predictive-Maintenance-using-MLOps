name: Automated Retraining Pipeline

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday
  workflow_dispatch:    # Manual trigger button in GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for drift
        id: drift
        # This script should exit with exit code 1 if drift is found
        run: python scripts/test_drift.py 
        continue-on-error: true # Allow pipeline to continue to handle exit codes

      - name: Retrain model
        # Only runs if drift was detected (exit code 1)
        if: steps.drift.outcome == 'failure'
        run: python scripts/retrain_pipeline.py

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: drift_report.json